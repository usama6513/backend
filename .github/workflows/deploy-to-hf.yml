name: Deploy to Hugging Face

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Hugging Face Hub
      run: pip install huggingface-hub

    - name: Deploy to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # Clone the space repository
        git clone https://user:$HF_TOKEN@huggingface.co/spaces/usama6513/project hf-space

        # Copy all files except .git and .github
        rsync -av --exclude='.git' --exclude='.github' --exclude='hf-space' . hf-space/

        # Commit and push changes
        cd hf-space
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add .
        git commit -m "Deploy from GitHub Action - $(date)" || exit 0
        git push origin main